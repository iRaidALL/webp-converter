<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleekWebP Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SleekWebP Converter</h1>
        <div id="drop-zone" class="drop-zone">
            <p>Drag & Drop Images Here or Click to Upload</p>
            <input type="file" id="file-input" accept="image/png, image/jpeg" multiple hidden>
        </div>
        <div id="image-comparison-container" class="image-comparison-container"></div>
        <button id="download-all-zip" class="download-all-zip" style="display: none;">Download All as ZIP</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
